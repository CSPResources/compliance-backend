<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compliance Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .text-csp-purple { color: #4D148C; }
    .bg-csp-purple { background-color: #4D148C; }
    .bg-csp-purple-light { background-color: #ede7f6; }
    .border-csp-purple { border-color: #4D148C; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="dashboard-root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const API_KEY = window.DASHBOARD_API_KEY || '';

    function SystemStatus({ isGood, label, details }) {
      return (
        <div className="flex items-start gap-2 py-1">
          <span className={isGood ? "text-emerald-600 font-bold" : "text-rose-600 font-bold"}>
            {isGood ? "✓" : "✗"}
          </span>
          <div>
            <span className="text-sm text-gray-700">{label}</span>
            {details && <div className="text-xs text-gray-400">{details}</div>}
          </div>
        </div>
      );
    }

    function ComplianceDashboard({ clientName }) {
      const [reportData, setReportData] = useState(null);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [expandedDriver, setExpandedDriver] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [statusFilter, setStatusFilter] = useState('all');
      const [driverTypeFilter, setDriverTypeFilter] = useState('all');

      useEffect(() => {
        async function fetchData() {
          try {
            const res = await fetch(`/api/reports/${encodeURIComponent(clientName)}`, {
              headers: { 'x-api-key': API_KEY }
            });
            if (!res.ok) throw new Error(`Error ${res.status}: ${await res.text()}`);
            const json = await res.json();
            setReportData(json.data);
            setLastUpdated(json.lastUpdated);
          } catch (err) {
            setError(err.message);
          } finally {
            setLoading(false);
          }
        }
        fetchData();
      }, [clientName]);

      const drivers = useMemo(() => {
        if (!reportData) return [];
        return (reportData.checks || []).map((check, i) => ({
          id: i,
          firstName: check.driver?.first_name || '',
          lastName: check.driver?.last_name || '',
          fedexId: check.driver?.fedex_id || '',
          state: check.driver?.state || '',
          driverType: check.driver?.driver_type || '',
          checkDate: check.check_date || '',
          mgbPresent: check.mgb_present,
          mgbAllGood: check.mgb_present && check.mgb_status_good && check.mgb_id_match && check.mgb_state_match && check.mgb_company_ok && check.mgb_workforce_active && check.mgb_driver_active,
          mgbIdMatch: check.mgb_id_match,
          mgbStateMatch: check.mgb_state_match,
          mgbCompanyOk: check.mgb_company_ok,
          mgbWorkforceActive: check.mgb_workforce_active,
          mgbDriverActive: check.mgb_driver_active,
          fadvPresent: check.fadv_present,
          fadvAllGood: check.fadv_present && check.fadv_status_good && check.fadv_id_match && check.fadv_state_match && check.fadv_job_active,
          fadvIdMatch: check.fadv_id_match,
          fadvStateMatch: check.fadv_state_match,
          fadvJobActive: check.fadv_job_active,
          medCardStatus: check.med_card_status,
          medCardDate: check.med_card_expiration,
          hasIssues: check.has_issues
        }));
      }, [reportData]);

      const filteredData = useMemo(() => {
        return drivers.filter(d => {
          const q = searchQuery.toLowerCase();
          const matchSearch = !q || `${d.firstName} ${d.lastName} ${d.fedexId}`.toLowerCase().includes(q);
          const matchStatus = statusFilter === 'all' || (statusFilter === 'issues' ? d.hasIssues : !d.hasIssues);
          const matchType = driverTypeFilter === 'all' || d.driverType === driverTypeFilter;
          return matchSearch && matchStatus && matchType;
        });
      }, [drivers, searchQuery, statusFilter, driverTypeFilter]);

      if (loading) return (
        <div className="flex items-center justify-center h-screen">
          <div className="text-center">
            <div className="text-4xl mb-4">⏳</div>
            <p className="text-gray-600">Loading compliance data...</p>
          </div>
        </div>
      );

      if (error) return (
        <div className="flex items-center justify-center h-screen">
          <div className="text-center bg-white p-8 rounded-xl shadow-md max-w-md">
            <div className="text-4xl mb-4">⚠️</div>
            <h2 className="text-xl font-bold text-gray-800 mb-2">Could not load data</h2>
            <p className="text-gray-500 text-sm">{error}</p>
          </div>
        </div>
      );

      const cleanCount = drivers.filter(d => !d.hasIssues).length;
      const issueCount = drivers.filter(d => d.hasIssues).length;

      return (
        <div className="max-w-7xl mx-auto px-4 py-8">
          {/* Header */}
          <div className="bg-csp-purple text-white rounded-xl p-6 mb-6 shadow-lg">
            <h1 className="text-2xl font-bold">{clientName}</h1>
            <p className="text-purple-200 text-sm mt-1">
              Last updated: {lastUpdated ? new Date(lastUpdated).toLocaleString() : 'Unknown'}
            </p>
          </div>

          {/* Summary Cards */}
          <div className="grid grid-cols-3 gap-4 mb-6">
            <div className="bg-white rounded-xl shadow-md p-5 text-center">
              <div className="text-3xl font-bold text-gray-800">{drivers.length}</div>
              <div className="text-sm text-gray-500 mt-1">Total Drivers</div>
            </div>
            <div className="bg-white rounded-xl shadow-md p-5 text-center">
              <div className="text-3xl font-bold text-emerald-600">{cleanCount}</div>
              <div className="text-sm text-gray-500 mt-1">Clean</div>
            </div>
            <div className="bg-white rounded-xl shadow-md p-5 text-center">
              <div className="text-3xl font-bold text-rose-600">{issueCount}</div>
              <div className="text-sm text-gray-500 mt-1">Issues Found</div>
            </div>
          </div>

          {/* Filters */}
          <div className="bg-white rounded-xl shadow-md p-5 mb-6">
            <div className="grid grid-cols-3 gap-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Search</label>
                <input
                  type="text"
                  value={searchQuery}
                  onChange={e => setSearchQuery(e.target.value)}
                  placeholder="Name or FedEx ID..."
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Status</label>
                <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg">
                  <option value="all">All Status</option>
                  <option value="clean">Clean Only</option>
                  <option value="issues">Issues Only</option>
                </select>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Driver Type</label>
                <select value={driverTypeFilter} onChange={e => setDriverTypeFilter(e.target.value)}
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg">
                  <option value="all">All Types</option>
                  <option value="linehaul">Linehaul</option>
                  <option value="p&d">P&D</option>
                </select>
              </div>
            </div>
          </div>

          {/* Drivers Table */}
          <div className="bg-white rounded-xl shadow-md overflow-hidden">
            <div className="px-6 py-4 border-b border-gray-200 bg-gray-50">
              <h2 className="text-lg font-semibold text-gray-900">
                Drivers {filteredData.length !== drivers.length && `(${filteredData.length} of ${drivers.length})`}
              </h2>
            </div>
            <div className="overflow-x-auto">
              <table className="min-w-full divide-y divide-gray-200">
                <thead className="bg-gray-50">
                  <tr>
                    <th className="w-8"></th>
                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Driver</th>
                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">FedEx ID</th>
                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">State</th>
                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                    <th className="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">MGB</th>
                    <th className="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">FADV</th>
                    <th className="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Status</th>
                  </tr>
                </thead>
                <tbody className="bg-white divide-y divide-gray-200">
                  {filteredData.map(driver => (
                    <React.Fragment key={driver.id}>
                      <tr onClick={() => setExpandedDriver(expandedDriver === driver.id ? null : driver.id)}
                        className="hover:bg-gray-50 cursor-pointer transition">
                        <td className="px-3 py-4 text-gray-400">{expandedDriver === driver.id ? '▼' : '▶'}</td>
                        <td className="px-6 py-4 text-sm font-medium text-gray-900">{driver.firstName} {driver.lastName}</td>
                        <td className="px-6 py-4 text-sm font-mono text-gray-900">{driver.fedexId}</td>
                        <td className="px-6 py-4 text-sm text-gray-900">{driver.state}</td>
                        <td className="px-6 py-4">
                          <span className="px-3 py-1 text-xs font-semibold rounded-full bg-csp-purple-light text-csp-purple">
                            {driver.driverType === 'linehaul' ? 'Linehaul' : 'P&D'}
                          </span>
                        </td>
                        <td className="px-6 py-4 text-center">
                          {driver.mgbPresent ? (
                            <span className={driver.mgbAllGood ? "text-emerald-600 text-xl" : "text-rose-600 text-xl"}>
                              {driver.mgbAllGood ? "✓" : "✗"}
                            </span>
                          ) : <span className="text-gray-400 text-sm">N/A</span>}
                        </td>
                        <td className="px-6 py-4 text-center">
                          {driver.fadvPresent ? (
                            <span className={driver.fadvAllGood ? "text-emerald-600 text-xl" : "text-rose-600 text-xl"}>
                              {driver.fadvAllGood ? "✓" : "✗"}
                            </span>
                          ) : <span className="text-gray-400 text-sm">N/A</span>}
                        </td>
                        <td className="px-6 py-4 text-center">
                          <span className={`px-3 py-1 text-xs font-semibold rounded-full ${driver.hasIssues ? 'bg-rose-100 text-rose-800' : 'bg-emerald-100 text-emerald-800'}`}>
                            {driver.hasIssues ? 'Issues' : 'Clean'}
                          </span>
                        </td>
                      </tr>
                      {expandedDriver === driver.id && (
                        <tr>
                          <td colSpan="8" className="px-6 py-6 bg-gray-50">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                              <div className="bg-white rounded-lg p-4 border-2 border-gray-200">
                                <h3 className="text-md font-bold text-csp-purple mb-4">My Ground Biz (MGB)</h3>
                                {driver.mgbPresent ? (
                                  <div className="space-y-1">
                                    <SystemStatus isGood={driver.mgbIdMatch} label={`ID Match: ${driver.fedexId}`} />
                                    <SystemStatus isGood={driver.mgbStateMatch} label={`State: ${driver.state}`} />
                                    <SystemStatus isGood={driver.mgbCompanyOk} label="Company Active" />
                                    <SystemStatus isGood={driver.mgbWorkforceActive} label="Workforce Active" />
                                    <SystemStatus isGood={driver.mgbDriverActive} label="Driver Active" />
                                  </div>
                                ) : <p className="text-sm text-gray-500">Driver not found in MGB</p>}
                              </div>
                              <div className="bg-white rounded-lg p-4 border-2 border-gray-200">
                                <h3 className="text-md font-bold text-csp-purple mb-4">First Advantage (FADV)</h3>
                                {driver.fadvPresent ? (
                                  <div className="space-y-1">
                                    <SystemStatus isGood={driver.fadvIdMatch} label={`ID Match: ${driver.fedexId}`} />
                                    <SystemStatus isGood={driver.fadvStateMatch} label={`State: ${driver.state}`} />
                                    <SystemStatus isGood={driver.fadvJobActive} label="Job Active" />
                                    {driver.medCardStatus && driver.medCardStatus !== 'n/a' && (
                                      <SystemStatus isGood={driver.medCardStatus === 'valid'}
                                        label={`Medical Card: ${driver.medCardStatus}`}
                                        details={driver.medCardDate ? `Expires: ${driver.medCardDate}` : null} />
                                    )}
                                  </div>
                                ) : <p className="text-sm text-gray-500">Driver not found in FADV</p>}
                              </div>
                            </div>
                            <p className="mt-4 text-xs text-gray-400">Last checked: {driver.checkDate}</p>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
              {filteredData.length === 0 && (
                <div className="text-center py-12 text-gray-500">No drivers found matching your filters.</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Simple client selector if no client is specified
    function App() {
      const [clients, setClients] = useState(null);
      const [selectedClient, setSelectedClient] = useState(null);
      const [loadingClients, setLoadingClients] = useState(true);

      useEffect(() => {
        async function fetchClients() {
          try {
            const res = await fetch('/api/clients', { headers: { 'x-api-key': API_KEY } });
            const data = await res.json();
            setClients(data);
            if (data.length === 1) setSelectedClient(data[0].client_name);
          } catch (e) {
            setClients([]);
          } finally {
            setLoadingClients(false);
          }
        }
        fetchClients();
      }, []);

      if (loadingClients) return (
        <div className="flex items-center justify-center h-screen">
          <p className="text-gray-500">Loading...</p>
        </div>
      );

      if (!selectedClient) return (
        <div className="flex items-center justify-center h-screen">
          <div className="bg-white rounded-xl shadow-md p-8 max-w-md w-full">
            <div className="bg-csp-purple text-white text-center py-4 rounded-lg mb-6">
              <h1 className="text-xl font-bold">Compliance Dashboard</h1>
            </div>
            {clients && clients.length > 0 ? (
              <>
                <p className="text-gray-600 mb-4 text-sm">Select a client to view their report:</p>
                {clients.map(c => (
                  <button key={c.client_name}
                    onClick={() => setSelectedClient(c.client_name)}
                    className="w-full text-left px-4 py-3 mb-2 border border-gray-200 rounded-lg hover:bg-gray-50 transition">
                    <div className="font-medium text-gray-800">{c.client_name}</div>
                    <div className="text-xs text-gray-400">Last updated: {new Date(c.created_at).toLocaleString()}</div>
                  </button>
                ))}
              </>
            ) : (
              <p className="text-center text-gray-500">No reports available yet.</p>
            )}
          </div>
        </div>
      );

      return <ComplianceDashboard clientName={selectedClient} />;
    }

    ReactDOM.render(<App />, document.getElementById('dashboard-root'));
  </script>
</body>
</html>
